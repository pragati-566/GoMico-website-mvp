# ============================================================
# Netlify deployment configuration
# Just push to your Git repo and connect it on Netlify.
# The site root is this folder (gomico website mvp website).
# ============================================================

[build]
  publish = "."

# Custom headers for performance & security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA-style redirect (all routes → index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
